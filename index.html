<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoundPlay Multi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="logo">SoundPlay <span class="badge">VK + Yandex</span></h1>
        </header>

        <main class="content-area">
            <section id="page-top" class="page active">
                <h2 class="section-title">Популярное</h2>
                <div id="top-tracks" class="track-list">
                    <div class="status-msg">Загрузка новинок...</div>
                </div>
            </section>

            <section id="page-search" class="page">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Поиск везде..." autocomplete="off">
                </div>
                <div id="search-results" class="track-list">
                    <div class="status-msg">Введите название песни или артиста</div>
                </div>
            </section>

            <section id="page-library" class="page">
                <h2 class="section-title">Моя музыка</h2>
                <div id="library-tracks" class="track-list">
                    <div class="status-msg">Здесь будут ваши сохраненные треки</div>
                </div>
            </section>
        </main>

        <div id="mini-player" class="mini-player hidden">
            <div class="mp-info">
                <div id="mp-title" class="mp-title">Загрузка...</div>
                <div id="mp-artist" class="mp-artist">Артист</div>
            </div>
            <div class="mp-controls">
                <button id="btn-play-pause" class="btn-icon">▶</button>
                <button id="btn-add-lib" class="btn-icon">♥</button>
            </div>
            <div id="mp-progress" class="mp-progress"></div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="page-top">Топ</button>
            <button class="nav-btn" data-target="page-search">Поиск</button>
            <button class="nav-btn" data-target="page-library">Медиатека</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
