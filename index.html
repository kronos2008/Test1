<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>SOUNDWAVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Aurora background -->
<div id="aurora" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>
<div id="grain" aria-hidden="true"></div>

<div id="app">

  <!-- HEADER -->
  <header id="app-header">
    <div class="logo">SOUND<span class="logo-accent">WAVE</span><span class="logo-dot"></span></div>
    <div class="header-right">
      <!-- Source toggle: iTunes / Jamendo -->
      <button class="source-btn active" id="src-itunes" title="iTunes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        iTunes
      </button>
      <button class="source-btn" id="src-jamendo" title="Jamendo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Jamendo
      </button>
      <button class="icon-btn" id="btn-theme" title="Тема">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SC KEY BANNER (shows if no client id) -->

  <!-- TAB BAR -->
  <nav id="tab-bar">
    <button class="tab active" data-tab="charts">
      <span class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
        </svg>
      </span>
      <span class="tab-label">Чарты</span>
    </button>
    <button class="tab" data-tab="library">
      <span class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </span>
      <span class="tab-label">Библиотека</span>
    </button>
    <button class="tab" data-tab="playlists">
      <span class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </span>
      <span class="tab-label">Плейлисты</span>
    </button>
    <button class="tab" data-tab="search">
      <span class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <span class="tab-label">Поиск</span>
    </button>
    <div id="tab-indicator"></div>
  </nav>

  <!-- PAGES -->
  <main id="pages">

    <!-- CHARTS -->
    <section class="page active" id="page-charts">
      <h1 class="page-title">ТОП <span class="accent">ЧАРТЫ</span></h1>
      <div class="genre-chips" id="genre-chips">
        <button class="chip active" data-genre="pop">Pop</button>
        <button class="chip" data-genre="hip-hop">Hip-Hop</button>
        <button class="chip" data-genre="rock">Rock</button>
        <button class="chip" data-genre="electronic">Electronic</button>
        <button class="chip" data-genre="rnb">R&amp;B</button>
        <button class="chip" data-genre="jazz">Jazz</button>
        <button class="chip" data-genre="metal">Metal</button>
        <button class="chip" data-genre="indie">Indie</button>
      </div>
      <div class="action-row">
        <button class="btn-primary" id="charts-play-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Воспроизвести
        </button>
        <button class="btn-secondary" id="charts-shuffle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
          Перемешать
        </button>
      </div>
      <div id="charts-list"><div class="loading-state"><div class="loader"></div><p>Загружаем…</p></div></div>
    </section>

    <!-- LIBRARY -->
    <section class="page" id="page-library">
      <h1 class="page-title">МОЯ <span class="accent">МУЗЫКА</span></h1>
      <div class="action-row">
        <button class="btn-primary" id="library-play-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Воспроизвести
        </button>
        <button class="btn-secondary" id="library-shuffle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
          Перемешать
        </button>
      </div>
      <div id="library-list">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <p class="empty-title">Библиотека пуста</p>
          <p class="empty-sub">Найдите треки и добавьте через иконку сердца</p>
        </div>
      </div>
    </section>

    <!-- PLAYLISTS -->
    <section class="page" id="page-playlists">
      <div class="page-title-row">
        <h1 class="page-title">ПЛЕЙ<span class="accent">ЛИСТЫ</span></h1>
        <button class="icon-btn" id="btn-new-playlist" title="Создать плейлист">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div id="playlists-grid"></div>
    </section>

    <!-- SEARCH -->
    <section class="page" id="page-search">
      <h1 class="page-title">ПО<span class="accent">ИСК</span></h1>
      <div class="search-wrap">
        <span class="search-icon-left">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input type="search" id="search-input" placeholder="Трек, исполнитель…" autocomplete="off"/>
        <button class="search-clear" id="search-clear" aria-label="Очистить">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="search-results">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <p class="empty-title">Начните поиск</p>
          <p class="empty-sub">Введите название трека или исполнителя</p>
        </div>
      </div>
    </section>

  </main>

  <!-- MINI PLAYER -->
  <div id="mini-player" class="hidden">
    <div class="mini-progress-bar"><div id="mini-progress-fill"></div></div>
    <div class="mini-player-inner">
      <div class="mini-art-wrap">
        <img id="mini-art" src="" alt=""/>
        <div class="mini-art-ring"></div>
      </div>
      <div class="mini-info" id="mini-open-player">
        <p class="mini-title" id="mini-title">—</p>
        <p class="mini-artist" id="mini-artist">—</p>
      </div>
      <div class="mini-controls">
        <button class="mini-btn" id="mini-prev">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="19 20 9 12 19 4 19 20"/>
            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="mini-btn mini-play-btn" id="mini-play">
          <svg id="mini-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <button class="mini-btn" id="mini-next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="mini-btn mini-like-btn" id="mini-like">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<!-- FULL PLAYER MODAL -->
<div id="full-player" class="hidden">
  <div class="fp-bg-blur" id="fp-bg-blur"></div>
  <div class="fp-content">
    <button class="fp-close" id="fp-close">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="fp-source-badge" id="fp-source-badge"></div>
    <div class="fp-art-wrap">
      <img id="fp-art" src="" alt=""/>
      <div class="fp-art-glow" id="fp-art-glow"></div>
    </div>
    <div class="fp-meta">
      <div class="fp-title-row">
        <div class="fp-text">
          <p class="fp-title" id="fp-title">—</p>
          <p class="fp-artist" id="fp-artist">—</p>
        </div>
        <button class="fp-like-btn" id="fp-like">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="fp-progress-wrap">
      <div class="fp-progress-track" id="fp-progress-track">
        <div class="fp-progress-fill" id="fp-progress-fill">
          <div class="fp-progress-thumb"></div>
        </div>
      </div>
      <div class="fp-times">
        <span id="fp-current">0:00</span>
        <span id="fp-duration">0:00</span>
      </div>
    </div>
    <div class="fp-controls">
      <button class="fp-ctrl-btn" id="fp-shuffle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button class="fp-ctrl-btn fp-prev-btn" id="fp-prev">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="19 20 9 12 19 4 19 20"/>
          <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="fp-play-btn" id="fp-play">
        <svg id="fp-play-icon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <button class="fp-ctrl-btn fp-next-btn" id="fp-next">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 4 15 12 5 20 5 4"/>
          <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="fp-ctrl-btn" id="fp-repeat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>
    <div class="fp-volume-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      </svg>
      <input type="range" id="fp-volume" min="0" max="100" value="80"/>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </div>
  </div>
</div>

<!-- PLAYLIST CREATE MODAL -->
<div id="playlist-modal" class="hidden">
  <div class="modal-overlay" id="playlist-modal-overlay"></div>
  <div class="modal-box">
    <h2 class="modal-title">Новый плейлист</h2>
    <input type="text" id="playlist-name-input" placeholder="Название плейлиста…" maxlength="40"/>
    <div class="modal-actions">
      <button class="btn-secondary" id="playlist-cancel">Отмена</button>
      <button class="btn-primary" id="playlist-create">Создать</button>
    </div>
  </div>
</div>

<!-- ADD TO PLAYLIST MODAL -->
<div id="add-playlist-modal" class="hidden">
  <div class="modal-overlay" id="add-playlist-overlay"></div>
  <div class="modal-box">
    <h2 class="modal-title">В плейлист</h2>
    <div id="add-playlist-list"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="add-playlist-cancel">Закрыть</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden"></div>


<script src="app.js"></script>
</body>
</html>
