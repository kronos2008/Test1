<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinema Party Tube</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем SDK Телеграм и PeerJS для связи -->
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <!-- API YouTube -->
    <script src="https://www.youtube.com"></script>
</head>
<body>
    <!-- Экран выбора -->
    <div id="setup-screen" class="screen">
        <div class="glass-card">
            <h1 class="logo-text">Watch Together</h1>
            <p class="sub-text">YouTube & Web Movies</p>
            <div class="input-container">
                <input type="text" id="video-url" placeholder="Ссылку на YouTube сюда...">
                <button class="btn-main" onclick="startMovie()">Смотреть</button>
            </div>
        </div>
    </div>

    <!-- Основной плеер и чат -->
    <div id="main-app" class="screen hidden">
        <div class="player-wrapper">
            <div class="custom-close" onclick="location.reload()"></div>
            <div id="yt-player"></div> <!-- Сюда встроится YouTube -->
        </div>

        <div class="chat-container">
            <div id="messages" class="chat-flow"></div>
            <div class="chat-input-row">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button class="btn-send" onclick="sendMsg()">➤</button>
            </div>
            <button class="btn-invite" onclick="inviteFriend()">Пригласить друга</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
