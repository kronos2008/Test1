<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoundPlay</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <script src="soundcloud.js"></script>
    <script src="db.js"></script>
</head>
<body>
    <div class="app">
        <!-- Шапка как на скрине 1001565439.jpg -->
        <div class="header">
            <h1>SoundPlay</h1>
            <span class="users">Загрузка...</span>
        </div>
        
        <!-- Контент меняется через JS -->
        <div id="content"></div>
        
        <!-- Нижняя навигация как на скринах -->
        <div class="bottom-nav">
            <div class="nav-item active" data-page="top">Топ</div>
            <div class="nav-item" data-page="library">Медиатека</div>
            <div class="nav-item" data-page="playlists">Плейлисты</div>
            <div class="nav-item" data-page="search">Поиск</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#1A1A2E';
        tg.headerColor = '#8A2BE2';
        
        let currentPage = 'top';
        let currentTrack = null;
        let audioPlayer = null;
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await db.init();
            await loadPage('top');
            await updateUserCount();
            
            // Навигация
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    loadPage(item.dataset.page);
                });
            });
        });
        
        // Обновление счетчика пользователей
        async function updateUserCount() {
            try {
                // В реальном приложении здесь будет запрос к боту
                document.querySelector('.users').textContent = '19,135 пользователей';
            } catch (error) {
                document.querySelector('.users').textContent = 'SoundPlay';
            }
        }
        
        // Загрузка страниц
        async function loadPage(page) {
            currentPage = page;
            const content = document.getElementById('content');
            
            switch(page) {
                case 'top':
                    await loadTopPage(content);
                    break;
                case 'library':
                    await loadLibraryPage(content);
                    break;
                case 'playlists':
                    await loadPlaylistsPage(content);
                    break;
                case 'search':
                    loadSearchPage(content);
                    break;
            }
        }
        
        // Страница ТОП (как на скрине 1001565434.jpg)
        async function loadTopPage(container) {
            container.innerHTML = '<div class="loading">Загрузка треков...</div>';
            
            const tracks = await soundcloud.getTopCharts(20);
            
            let html = `
                <div class="top-header">
                    <h2>Топ Чарты</h2>
                    <div class="top-actions">
                        <button class="play-all" onclick="playAll()">▶ Воспроизвести</button>
                        <button class="shuffle-all" onclick="shuffleAll()">🔀 Перемешать</button>
                    </div>
                </div>
                <div class="tracks-list">
            `;
            
            tracks.forEach(track => {
                html += `
                    <div class="track-item" onclick="openPlayer(${JSON.stringify(track).replace(/"/g, '&quot;')})">
                        <span class="track-num">${track.num}</span>
                        <div class="track-info">
                            <div class="track-title">${track.title}</div>
                            <div class="track-artist">${track.artist}</div>
                        </div>
                        <span class="track-duration">${track.duration}</span>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // Страница Медиатека (как на скрине 1001565436.jpg)
        async function loadLibraryPage(container) {
            const library = await db.getLibrary();
            
            if (library.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>У вас пока нет музыки</p>
                        <p class="hint">Добавьте треки через поиск, и они появятся здесь</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="library-header">
                    <input type="text" class="search-box" placeholder="Поиск в медиатеке" onkeyup="searchLibrary(this.value)">
                    <div class="library-actions">
                        <button class="play-all" onclick="playAll()">▶ Воспроизвести</button>
                        <button class="shuffle-all" onclick="shuffleAll()">🔀 Перемешать</button>
                    </div>
                </div>
                <div class="tracks-list" id="library-tracks">
            `;
            
            library.forEach(track => {
                html += `
                    <div class="track-item" onclick="openPlayer(${JSON.stringify(track).replace(/"/g, '&quot;')})">
                        <div class="track-info">
                            <div class="track-title">${track.title}</div>
                            <div class="track-artist">${track.artist}</div>
                        </div>
                        <span class="track-duration">${track.duration}</span>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // Страница Плейлисты (как на скрине 1001565437.jpg)
        async function loadPlaylistsPage(container) {
            const playlists = await db.getPlaylists();
            
            if (playlists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>У вас пока нет плейлистов</p>
                        <p class="hint">Создайте плейлист, чтобы собирать свои любимые треки</p>
                        <button class="create-playlist-btn" onclick="createPlaylist()">+ Создать плейлист</button>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="playlists-list">';
            
            for (const playlist of playlists) {
                const tracks = await db.getPlaylistTracks(playlist.id);
                html += `
                    <div class="playlist-item" onclick="openPlaylist(${playlist.id})">
                        <div class="playlist-info">
                            <div class="playlist-name">${playlist.name}</div>
                            <div class="playlist-count">${tracks.length} треков</div>
                        </div>
                        <span class="playlist-arrow">▶</span>
                    </div>
                `;
            }
            
            html += `
                </div>
                <button class="create-playlist-btn" onclick="createPlaylist()">+ Создать плейлист</button>
            `;
            
            container.innerHTML = html;
        }
        
        // Страница Поиск (как на скрине 1001565438.jpg)
        function loadSearchPage(container) {
            container.innerHTML = `
                <div class="search-header">
                    <h2>Поиск музыки</h2>
                    <input type="text" class="search-box" placeholder="Введите название трека или исполнителя" onkeyup="searchTracks(this.value)">
                </div>
                <div class="search-results" id="search-results">
                    <div class="empty-state">
                        <p>Начните поиск музыки</p>
                        <p class="hint">Введите название трека или исполнителя</p>
                    </div>
                </div>
            `;
        }
        
        // Поиск треков
        async function searchTracks(query) {
            if (query.length < 2) return;
            
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="loading">Поиск...</div>';
            
            const tracks = await soundcloud.search(query);
            
            if (tracks.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <p>Ничего не найдено</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="tracks-list">';
            
            tracks.forEach(track => {
                html += `
                    <div class="track-item" onclick="openPlayer(${JSON.stringify(track).replace(/"/g, '&quot;')})">
                        <div class="track-info">
                            <div class="track-title">${track.title}</div>
                            <div class="track-artist">${track.artist}</div>
                        </div>
                        <span class="track-duration">${track.duration}</span>
                    </div>
                `;
            });
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }
        
        // Открыть плеер
        function openPlayer(track) {
            currentTrack = track;
            
            // Сохраняем в Telegram WebApp data
            tg.sendData(JSON.stringify({
                action: 'play',
                track: track
            }));
            
            // Открываем плеер
            window.location.href = `player.html?track=${encodeURIComponent(JSON.stringify(track))}`;
        }
        
        // Создать плейлист
        async function createPlaylist() {
            const name = prompt('Введите название плейлиста:');
            if (name) {
                await db.createPlaylist(name);
                await loadPage('playlists');
            }
        }
        
        // Поиск в медиатеке
        function searchLibrary(query) {
            // Функция поиска в локальной медиатеке
        }
        
        // Воспроизвести все
        function playAll() {
            // Функция воспроизведения всех треков
        }
        
        // Перемешать все
        function shuffleAll() {
            // Функция перемешивания
        }
    </script>
</body>
</html>
